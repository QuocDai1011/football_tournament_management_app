name: football_tournament_manager_app
description: "Professional Football Tournament Management System"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Code Generation (annotations only at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Cache (using hive without code gen)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  faker: ^2.1.0
  logger: ^2.4.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  collection: ^1.18.0

  # Icons
  cupertino_icons: ^1.0.8

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
